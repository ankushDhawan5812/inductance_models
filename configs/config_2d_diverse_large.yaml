## Scaled-up model for diverse trajectory dataset
data:
  csv_path: "../gp_fit_2d/trajectories/all_trajectories.csv"
  trajectories_dir: "data/trajectories_2d"
  window_size: 50
  stride: 1
  subsample_factor: 1
  test_size: 0.2
  val_size: 0.1
  batch_size: 256
  num_workers: 4

model:
  model_type: "transformer_ar"
  d_model: 128
  nhead: 8
  num_layers: 5
  dim_feedforward: 512
  fc_dims: [256, 128]
  dropout: 0.15
  output_dim: 2

training:
  epochs: 200
  lr: 0.0003
  weight_decay: 0.0001
  patience: 30
  loss: "huber"
  scheduler: "plateau"
  scheduler_factor: 0.5
  scheduler_patience: 10
  grad_clip: 1.0
  unroll_steps: 30
  unroll_curriculum_epochs: 40
  unroll_loss_weighting: "linear"
  smoothness_weight: 0.0
  predict_displacement: false
  tf_ratio_start: 1.0
  tf_ratio_end: 1.0
  tf_decay_epochs: 50

system:
  seed: 42
  output_dir: "output"
