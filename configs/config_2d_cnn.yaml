data:
  csv_path: "/home/ankushd/Documents/induction_sensing/gp_fit_2d_y_shape_oval/trajectories/all_trajectories.csv"
  trajectories_dir: "/home/ankushd/Documents/induction_sensing/gp_fit_2d_y_shape_oval/data/constant_v_traj"
  window_size: 10
  stride: 1
  subsample_factor: 1
  test_size: 0.2
  val_size: 0.1
  batch_size: 512
  num_workers: 4

model:
  model_type: "feedforward"
  conv_channels: [32, 64, 128]
  kernel_sizes: [7, 5, 3]
  fc_dims: [128, 64]
  dropout: 0.2
  output_dim: 2

training:
  epochs: 100
  lr: 0.0003
  weight_decay: 0.0001
  patience: 20
  loss: "mse"
  scheduler: "plateau"
  scheduler_factor: 0.5
  scheduler_patience: 8
  grad_clip: 1.0
  loss_scale: 10.0

system:
  seed: 42
  output_dir: "output"
