# Ablation: unroll_steps=40 (baseline=20), covers full trajectory (50-10=40)
data:
  csv_path: "../gp_fit_2d/trajectories/all_trajectories.csv"
  trajectories_dir: "data/trajectories_2d"
  window_size: 10
  stride: 1
  subsample_factor: 1
  test_size: 0.2
  val_size: 0.1
  batch_size: 512
  num_workers: 4

model:
  model_type: "causal_transformer_ar"
  d_model: 64
  nhead: 4
  num_layers: 3
  dim_feedforward: 256
  encoder_dims: [64]
  decoder_dims: [128, 64]
  dropout: 0.1
  output_dim: 2

training:
  epochs: 100
  lr: 0.0003
  weight_decay: 0.0001
  patience: 20
  loss: "mse"
  scheduler: "plateau"
  scheduler_factor: 0.5
  scheduler_patience: 8
  grad_clip: 1.0
  unroll_steps: 40
  unroll_curriculum_epochs: 20
  tf_ratio_start: 1.0
  tf_ratio_end: 1.0
  tf_decay_epochs: 50

system:
  seed: 42
  output_dir: "output"
