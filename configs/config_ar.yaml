data:
  csv_path: "../gp_fit/trajectories/all_trajectories.csv"
  trajectories_dir: "data/trajectories"
  window_size: 20
  stride: 1
  subsample_factor: 1
  test_size: 0.2
  val_size: 0.1
  batch_size: 512
  num_workers: 4

model:
  model_type: "ar"
  conv_channels: [32, 64, 128]
  kernel_sizes: [7, 5, 3]
  fc_dims: [128, 64]
  dropout: 0.2

training:
  epochs: 50
  lr: 0.001
  weight_decay: 0.0001
  patience: 10
  loss: "mse"
  scheduler: "plateau"
  scheduler_factor: 0.5
  scheduler_patience: 5
  grad_clip: 1.0
  tf_ratio_start: 1.0
  tf_ratio_end: 0.2
  tf_decay_epochs: 30

system:
  seed: 42
  output_dir: "output"
